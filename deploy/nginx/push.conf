# ============================================================
# Nginx 反向代理配置 - 即时消息推送系统
#
# 部署路径：/etc/nginx/sites-available/push.conf
# 启用方式：ln -s /etc/nginx/sites-available/push.conf /etc/nginx/sites-enabled/
#
# 功能：
#   1. HTTP API 代理到 127.0.0.1:9501
#   2. WebSocket 代理到 127.0.0.1:9502（含 Upgrade 头）
#   3. 管理后台静态文件（admin/dist）
#   4. SSL 配置示例（注释，需准备好证书后取消注释）
# ============================================================

# 上游：HTTP API 服务（Swoole HTTP Server，端口 9501）
upstream push_http {
    server 127.0.0.1:9501;
    keepalive 32;
}

# 上游：WebSocket 推送服务（Swoole WebSocket Server，端口 9502）
upstream push_websocket {
    server 127.0.0.1:9502;
    keepalive 64;
}

server {
    listen 80;
    # 替换为实际域名
    server_name push.example.com;

    # 客户端上传文件大小限制
    client_max_body_size 50m;

    # 访问日志
    access_log /var/log/nginx/push_access.log;
    error_log  /var/log/nginx/push_error.log;

    # ----------------------------------------------------------
    # 1. WebSocket 推送服务代理
    #    匹配 /ws 路径，代理到 127.0.0.1:9502
    # ----------------------------------------------------------
    location /ws {
        proxy_pass http://push_websocket;
        proxy_http_version 1.1;

        # WebSocket 必需的 Upgrade 和 Connection 头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接超时设置（默认 60s 太短）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 禁用缓冲（实时推送）
        proxy_buffering off;
    }

    # ----------------------------------------------------------
    # 2. 管理后台静态文件（Vue3 构建产物）
    # ----------------------------------------------------------
    location / {
        root /www/push-system/admin/dist;
        index index.html;
        # SPA 路由：所有前端路由 fallback 到 index.html
        try_files $uri $uri/ /index.html;

        # 静态资源缓存（带 hash 的文件长期缓存）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------------------------
    # 3. HTTP API 代理
    #    所有 /api、/admin、/auth、/captcha 路径代理到 127.0.0.1:9501
    # ----------------------------------------------------------
    location ~ ^/(api|admin|auth|captcha|health) {
        proxy_pass http://push_http;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 请求超时
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # APK 下载可能较大
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ----------------------------------------------------------
    # 4. APP 下载（APK 文件，大文件传输）
    # ----------------------------------------------------------
    location /admin/app-build/download/ {
        proxy_pass http://push_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 大文件传输优化
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------
    # 5. 安全：隐藏敏感文件
    # ----------------------------------------------------------
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    # ============================================================
    # SSL 配置示例（需准备好证书后取消注释，并注释上方 listen 80 段）
    # ============================================================
    # listen 443 ssl http2;
    #
    # # SSL 证书路径（替换为实际路径）
    # ssl_certificate     /etc/nginx/ssl/push.example.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/push.example.com.key;
    #
    # # SSL 协议与加密套件
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    #
    # # HSTS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

