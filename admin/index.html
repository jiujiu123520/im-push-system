<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="即时消息推送系统管理后台" />
    <title>Push · 即时消息推送管理后台</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 30% 20%, #6d5cff22, transparent 50%),
                    radial-gradient(circle at 70% 80%, #9b5cff22, transparent 50%),
                    #f7f8fc;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-orb {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, #6d5cff, #9b5cff, #5cb8ff, #6d5cff);
        animation: spin 1s linear infinite;
        position: relative;
      }
      .loader-orb::after {
        content: '';
        position: absolute;
        inset: 6px;
        border-radius: 50%;
        background: #f7f8fc;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loader">
        <div class="loader-orb"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('app-loader')
          if (loader) {
            loader.classList.add('hidden')
            setTimeout(() => loader.remove(), 500)
          }
        }, 200)
      })
    </script>
  </body>
</html>
