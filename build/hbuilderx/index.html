<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>消息推送</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.8"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h1 class="app-title">消息推送</h1>
                    <p class="app-subtitle">即时消息推送客户端</p>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label>推送 Key</label>
                        <input type="text" id="key-input" placeholder="请输入推送 Key" />
                    </div>
                    <div class="form-group">
                        <label>服务器地址</label>
                        <input type="text" id="server-input" placeholder="http://example.com:9501" />
                    </div>
                    <button id="login-btn" class="btn-primary">连接</button>
                </div>
            </div>
        </div>

        <!-- 主页面 -->
        <div id="main-page" class="page">
            <div class="header">
                <div class="header-left">
                    <h2>消息推送</h2>
                    <span id="connection-status" class="status-dot disconnected"></span>
                </div>
                <div class="header-right">
                    <button id="settings-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="today-count">0</div>
                    <div class="stat-label">今日推送</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">累计推送</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="device-id">--</div>
                    <div class="stat-label">设备ID</div>
                </div>
            </div>

            <!-- 消息列表 -->
            <div class="message-section">
                <div class="section-header">
                    <h3>消息记录</h3>
                    <button id="clear-btn" class="text-btn">清空</button>
                </div>
                <div id="message-list" class="message-list">
                    <div class="empty-state">
                        <p>暂无消息</p>
                        <span>推送的消息将显示在这里</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置页面 -->
        <div id="settings-page" class="page">
            <div class="header">
                <div class="header-left">
                    <button id="back-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <h2>设置</h2>
                </div>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <div class="setting-label">推送 Key</div>
                    <input type="text" id="setting-key" readonly />
                </div>
                <div class="setting-item">
                    <div class="setting-label">服务器地址</div>
                    <input type="text" id="setting-server" readonly />
                </div>
                <div class="setting-item">
                    <div class="setting-label">WebSocket 地址</div>
                    <input type="text" id="setting-ws" readonly />
                </div>
                <div class="setting-item">
                    <div class="setting-label">应用版本</div>
                    <div class="setting-value" id="app-version">1.0.0</div>
                </div>
                <button id="logout-btn" class="btn-danger">退出登录</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
